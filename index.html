<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gülzar'a Sürpriz ❤️</title>
    <style>
        :root {
            --bg-color: #fffaf0;
            --card-red: #e63946;
            --heart-gold: #ffb703;
            --text-color: #2b2d42;
        }

        body {
            background: linear-gradient(135deg, #fffaf0 0%, #ffe4e1 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        /* Zarf Tasarımı */
        .envelope {
            width: 300px;
            height: 200px;
            background-color: var(--card-red);
            position: relative;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .seal {
            width: 60px;
            height: 60px;
            background-color: var(--heart-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: white;
        }

        /* Soru Ekranı */
        #question-screen {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .main-img {
            width: 200px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 { color: var(--card-red); font-size: 26px; margin-bottom: 20px; }

        /* Butonları Ayıran Kısım */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px; /* Butonlar arası boşluk */
            position: relative;
            width: 300px;
            height: 100px;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        #yes-btn { background-color: #2ecc71; color: white; }
        
        #no-btn { 
            background-color: var(--card-red); 
            color: white; 
            position: relative; /* Üst üste binmeyi engeller */
        }

        /* Kutlama */
        #celebration {
            display: none;
            animation: fadeIn 1s;
        }

        .love-text {
            color: #e63946;
            font-size: 28px;
            font-weight: bold;
        }

        .final-img { width: 220px; border-radius: 15px; margin-top: 15px; }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <audio id="background-music" loop>
        <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/background%20music.mp3" type="audio/mpeg">
    </audio>

    <div id="envelope-container" class="envelope" onclick="openCard()">
        <div class="seal">❤️</div>
    </div>

    <div id="question-screen">
        <img class="main-img" src="https://media.tenor.com/9O0Z-S3_U78AAAAM/cute-bear.gif" alt="Soru">
        <h1>Gülzar beni seviyor musun?</h1>
        <div class="btn-container">
            <button id="yes-btn" onclick="celebrate()">EVET</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">HAYIR</button>
        </div>
    </div>

    <div id="celebration">
        <p class="love-text">Bende seni seviyorum ❤️</p>
        <img class="final-img" src="https://media.tenor.com/UInWnCjC_mIAAAAM/love-mochi.gif" alt="Kutlama">
    </div>

    <script>
        function openCard() {
            document.getElementById('envelope-container').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
            document.getElementById('background-music').play();
        }

        function moveNoButton() {
            const btn = document.getElementById('no-btn');
            // Butonun kaçma alanını genişlettik
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function celebrate() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('celebration').style.display = 'block';
            setInterval(createHeart, 200);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = '25px';
            heart.style.transition = '3s linear';
            document.body.appendChild(heart);
            setTimeout(() => { heart.style.top = '-10vh'; }, 50);
            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
