<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sürprizim Var ❤️</title>
    <style>
        :root {
            --bg-color: #fffaf0;
            --card-red: #e63946;
            --heart-gold: #ffb703;
            --text-color: #2b2d42;
        }

        body {
            background: linear-gradient(135deg, #fffaf0 0%, #ffe4e1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            color: var(--text-color);
        }

        /* Zarf Tasarımı */
        .envelope {
            width: 320px;
            height: 220px;
            background-color: var(--card-red);
            position: relative;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .seal {
            width: 60px;
            height: 60px;
            background-color: var(--heart-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Soru Ekranı (Başlangıçta Gizli) */
        #question-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 400px;
        }

        .main-img {
            width: 200px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 { color: var(--card-red); margin-bottom: 30px; font-size: 28px; }

        .btn-container {
            display: flex;
            gap: 20px;
            position: relative;
            height: 150px;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 18px 40px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yes-btn { 
            background-color: #2ecc71; 
            color: white; 
            z-index: 100;
        }

        #no-btn { 
            background-color: var(--card-red); 
            color: white; 
            position: absolute; 
        }

        /* Kutlama Ekranı */
        #celebration {
            display: none;
            font-size: 24px;
            color: #d63384;
        }

        .love-text {
            color: #e63946;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .final-img {
            width: 250px;
            margin-top: 20px;
            border-radius: 15px;
        }

    </style>
</head>
<body>

    <audio id="background-music" loop>
        <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/background%20music.mp3" type="audio/mpeg">
    </audio>

    <div id="envelope-container" class="envelope" onclick="openCard()">
        <div class="seal">❤️</div>
    </div>

    <div id="question-screen">
        <img class="main-img" src="soru.gif" alt="Soru Resmi">
        <h1>Gülzar beni seviyor musun?</h1>
        <div class="btn-container">
            <button id="yes-btn" onclick="celebrate()">EVET</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">HAYIR</button>
        </div>
    </div>

    <div id="celebration">
        <p class="love-text">bende seni seviyorum ❤️</p>
        <p>Bende seni cok seviyorum ✨</p>
        <img class="final-img" src="kutlama.gif" alt="Kutlama">
    </div>

    <script>
        // Kartı Açma ve Müziği Başlatma
        function openCard() {
            document.getElementById('envelope-container').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
            document.getElementById('background-music').play().catch(error => {
                console.log("Müzik başlatılamadı:", error);
            });
        }

        // Hayır Butonunu Kaçırma
        function moveNoButton() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // Evet Kutlaması
        function celebrate() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('celebration').style.display = 'block';
            setInterval(createHeart, 150);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = Math.random() * 30 + 15 + 'px';
            heart.style.transition = 'all 3s linear';
            document.body.appendChild(heart);
            setTimeout(() => { heart.style.top = '-10vh'; heart.style.opacity = '0'; }, 50);
            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
