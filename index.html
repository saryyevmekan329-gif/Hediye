<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Seviyor Musun?</title>
    <style>
        :root {
            --bg-color: #f5f5dc;
            --card-red: #b22222;
            --heart-gold: #d4af37;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .envelope {
            width: 300px;
            height: 200px;
            background-color: var(--card-red);
            position: relative;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .seal {
            width: 50px;
            height: 50px;
            background-color: var(--heart-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
        }

        #question-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        h1 { color: var(--card-red); margin-bottom: 30px; }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            position: relative;
            width: 100%;
            height: 300px;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        #yes-btn { 
            background-color: #4CAF50; 
            color: white; 
            z-index: 999; /* En üstte durmasını sağlar */
        }

        #no-btn { 
            background-color: var(--card-red); 
            color: white; 
            position: absolute; /* Kaçabilmesi için şart */
            top: 150px;
        }

        #celebration {
            display: none;
            font-size: 28px;
            color: #d63384;
        }
    </style>
</head>
<body>

    <div id="envelope-container" class="envelope" onclick="openCard()">
        <div class="seal">❤️</div>
    </div>

    <div id="question-screen">
        <h1>Beni seviyor musun?</h1>
        <div class="btn-container">
            <button id="yes-btn" onclick="celebrate()">EVET</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">HAYIR</button>
        </div>
    </div>

    <div id="celebration">
        <p>Oleeey! ❤️</p>
        <p>Biliyordum! ✨</p>
        <div style="font-size: 80px;">🧸🧸🧸</div>
    </div>

    <script>
        function openCard() {
            document.getElementById('envelope-container').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
        }

        let noScale = 1;
        function moveNoButton() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            
            noScale -= 0.05;
            if (noScale < 0.3) noScale = 0.3;

            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.transform = `scale(${noScale})`;
        }

        function celebrate() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('celebration').style.display = 'block';
            
            setInterval(createHeart, 150);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = Math.random() * 30 + 15 + 'px';
            heart.style.transition = 'all 3s linear';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.style.top = '-10vh';
                heart.style.opacity = '0';
            }, 50);
            
            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
