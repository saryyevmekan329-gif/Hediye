<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sürprizim Var ❤️</title>
    <style>
        :root {
            /* Daha yumuşak renk tonları */
            --bg-color: #fffaf0; /* Fildişi */
            --card-red: #e63946; /* Canlı Kırmızı */
            --heart-gold: #ffb703; /* Altın Sarısı */
            --text-color: #2b2d42;
        }

        body {
            background: linear-gradient(135deg, #fffaf0 0%, #ffe4e1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            color: var(--text-color);
        }

        /* Zarif Animasyonlu Giriş */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Zarf Tasarımı */
        .envelope {
            width: 320px;
            height: 220px;
            background-color: var(--card-red);
            position: relative;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            animation: slideIn 1s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        /* Pul/Mühür */
        .seal {
            width: 60px;
            height: 60px;
            background-color: var(--heart-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        /* Soru Ekranı (Başlangıçta Gizli) */
        #question-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: slideIn 0.8s ease-out;
            width: 90%;
            max-width: 400px;
        }

        .main-img {
            width: 200px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 { color: var(--card-red); margin-bottom: 30px; font-size: 28px; }

        .btn-container {
            display: flex;
            gap: 20px;
            position: relative;
            height: 150px;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 18px 40px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yes-btn { 
            background-color: #2ecc71; 
            color: white; 
            z-index: 99; /* Hayır butonunun önüne geçmek için */
        }
        #yes-btn:hover { background-color: #27ae60; transform: translateY(-3px); }

        #no-btn { 
            background-color: var(--card-red); 
            color: white; 
            position: absolute; 
        }
        #no-btn:hover { background-color: #c0392b; }

        /* Kutlama Ekranı */
        #celebration {
            display: none;
            font-size: 32px;
            color: #d63384;
            animation: slideIn 0.8s ease-out;
        }

        .bear-gif { width: 250px; margin-top: 20px; border-radius: 15px; }

        /* Arka Plan Pırıltıları */
        .glitter {
            position: fixed;
            background-color: white;
            border-radius: 50%;
            pointer-events: none;
            animation: glitterAnim 5s infinite;
        }

        @keyframes glitterAnim {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }

    </style>
</head>
<body>

    <audio id="background-music" loop>
        <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/background%20music.mp3" type="audio/mpeg">
        Tarayıcınız ses öğesini desteklemiyor.
    </audio>

    <div id="envelope-container" class="envelope" onclick="openCard()">
        <div class="seal">❤️</div>
    </div>

    <div id="question-screen">
        <img class="main-img" src="https://media.tenor.com/9O0Z-S3_U78AAAAM/cute-bear.gif" alt="Soru Ayıcığı">
        <h1>Beni seviyor musun?</h1>
        <div class="btn-container">
            <button id="yes-btn" onclick="celebrate()">EVET</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">HAYIR</button>
        </div>
    </div>

    <div id="celebration">
        <p>Oleeey! ❤️</p>
        <p>Biliyordum! ✨</p>
        <img class="bear-gif" src="https://media.tenor.com/UInWnCjC_mIAAAAM/love-mochi.gif" alt="Kutlama Ayıcığı">
    </div>

    <script>
        // Arka Plan Pırıltıları Oluştur
        function createGlitter() {
            for(let i=0; i<30; i++) {
                const glitter = document.createElement('div');
                glitter.className = 'glitter';
                glitter.style.width = Math.random() * 5 + 2 + 'px';
                glitter.style.height = glitter.style.width;
                glitter.style.left = Math.random() * 100 + 'vw';
                glitter.style.top = Math.random() * 100 + 'vh';
                glitter.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(glitter);
            }
        }
        createGlitter();

        // Kartı Açma ve Müziği Başlatma
        function openCard() {
            document.getElementById('envelope-container').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
            
            // Müziği Başlat
            const music = document.getElementById('background-music');
            music.play().catch(error => {
                console.log("Müzik otomatik başlatılamadı, tarayıcı engelledi: ", error);
            });
        }

        // Hayır Butonunu Kaçırma
        let noScale = 1;
        function moveNoButton() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            
            // Küçültmeyi biraz daha yavaş yapalım
            noScale -= 0.05;
            if (noScale < 0.3) noScale = 0.3;

            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.transform = `scale(${noScale})`;
        }

        // Evet Kutlaması
        function celebrate() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('celebration').style.display = 'block';
            
            // Konfeti kalpleri
            setInterval(createHeart, 150);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = Math.random() * 30 + 15 + 'px';
            heart.style.transition = 'all 3s linear';
            heart.style.zIndex = '100';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.style.top = '-10vh';
                heart.style.opacity = '0';
            }, 50);
            
            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
